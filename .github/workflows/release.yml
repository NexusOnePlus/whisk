name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: dart pub global activate cider
      - run: dart pub get

      - name: Auto bump patch version
        shell: pwsh
        run: |
          dart run cider bump patch
          $content = Get-Content pubspec.yaml -Raw
          $match = [regex]::Match($content, 'version:\s+(\S+)')
          $fullVersion = $match.Groups[1].Value
          $parts = $fullVersion -split '\+'
          $version = $parts[0]
          $buildNumber = if ($parts.Length -gt 1) { $parts[1] } else { '1' }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "BUILD_NUMBER=$buildNumber" >> $env:GITHUB_OUTPUT
          echo "TAG=v$version" >> $env:GITHUB_OUTPUT

      - name: Build Flutter Windows
        run: flutter build windows --build-name ${{ steps.version.outputs.VERSION }} --build-number ${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Update Inno Setup version
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $content = Get-Content installer/whisk.iss -Raw
          $content = $content -replace '#define MyAppVersion ".*"', "#define MyAppVersion `"$version`""
          Set-Content installer/whisk.iss -Value $content

      - name: Compile Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\whisk.iss

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ steps.version.outputs.VERSION }}"
          git push

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Whisk ${{ steps.version.outputs.VERSION }}
          files: |
            installer/whisk-setup-*.exe
          generate_release_notes: true
